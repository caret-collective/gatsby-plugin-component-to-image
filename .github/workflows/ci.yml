name: ♾️ CI
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - next-major
      - next-minor
      - next-patch
jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🔨 Build
        run: pnpm build

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6

      - name: 🛠️ Setup
        uses: ./.github/actions/setup

      - name: 🧪 Run tests
        run: pnpm test
